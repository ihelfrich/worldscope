name: Render brief markdown to HTML

# When the routine commits a new briefings/<date>.md or
# weekly_briefings/<week>.md, render it to a publication-grade HTML page
# (sidebar TOC, watch-area dashboard, embedded charts + map, anomaly
# callouts) and stage in dist/ so Pages serves at /briefings/<date>.html
# or /weekly_briefings/<week>.html.

on:
  push:
    branches: [main]
    paths:
      - "briefings/**.md"
      - "briefings/**.png"
      - "weekly_briefings/**.md"
      - "weekly_briefings/**.png"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: render-briefings
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install markdown pyyaml
      - name: Render every brief to HTML
        run: python tools/render_brief.py
      - name: Commit dist/ briefings
        run: |
          git config user.name "worldscope-bot"
          git config user.email "noreply@github.com"
          git add -f dist/briefings dist/weekly_briefings || true
          git diff --staged --quiet || git commit -m "rendered briefs ($(date -u +%Y-%m-%d))"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
