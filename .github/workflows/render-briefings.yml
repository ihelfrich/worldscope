name: Render brief markdown to HTML

# When the routine commits a new briefings/<date>.md or
# weekly_briefings/<week>.md, render it to a publication-grade HTML page
# (sidebar TOC, watch-area dashboard, embedded charts + map, anomaly
# callouts) and stage in dist/ so Pages serves at /briefings/<date>.html
# or /weekly_briefings/<week>.html.

on:
  push:
    branches: [main]
    paths:
      - "briefings/**.md"
      - "briefings/**.png"
      - "weekly_briefings/**.md"
      - "weekly_briefings/**.png"
      - "tools/render_brief.py"
  schedule:
    # Catch routine pushes that GITHUB_TOKEN auth suppresses from triggering.
    # Fires hourly between 11:15 and 13:15 UTC (routine cron is 11:00 UTC).
    - cron: "15 11-13 * * *"
    # And once on Friday evenings to catch the weekly routine (20:00 UTC).
    - cron: "30 20 * * 5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # Shared with daily-brief, ukraine-hourly, and pushover-brief. See
  # daily-brief.yml's concurrency block for rationale.
  group: worldscope-state
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install markdown pyyaml
      - name: Fact-check numeric claims (HARD rule — fails the build on divergence)
        run: |
          # STANDING RULE: every number, every fact, every figure must be
          # checked against the lake's structured data before publication.
          # The fact-checker (worldscope.fact_check) validates claims with
          # deterministic same-day evidence and writes a typed claim ledger
          # for the homepage evidence drawer.
          #
          # First pass: annotate every brief with [⚠ actual ≈ $X] markers
          # inline so the divergence is visible in the published HTML
          # even when the CI build later allows it through.
          # Second pass: --fail-on FAIL exits 1 if anything still
          # diverges. The build fails. The HTML is NOT rendered. The
          # narrative does not ship until the desk officer reconciles
          # the divergent figures.
          if [ ! -f lake/db/worldscope.sqlite ]; then
            echo "Lake DB missing — cannot fact-check"
            exit 1
          fi
          mkdir -p dist/data
          latest_brief="$(ls briefings/*.md 2>/dev/null | sort | tail -n1 || true)"
          # Annotate FIRST (rewrites the .md in place with warnings)
          for f in briefings/*.md; do
            [ -f "$f" ] || continue
            python -m worldscope.fact_check "$f" \
              --lake lake/db/worldscope.sqlite \
              --annotate --fail-on never || true
            ann="${f%.md}.annotated.md"
            if [ -f "$ann" ]; then mv "$ann" "$f"; fi
          done
          # Then verify — strict. Exit 1 on any FAIL.
          fail_count=0
          for f in briefings/*.md; do
            [ -f "$f" ] || continue
            ledger_args=""
            if [ "$f" = "$latest_brief" ]; then
              ledger_args="--write-ledger dist/data/claims.json"
            fi
            if ! python -m worldscope.fact_check "$f" \
                  --lake lake/db/worldscope.sqlite --fail-on FAIL $ledger_args; then
              fail_count=$((fail_count + 1))
              echo "::error file=$f::Numeric claim diverges from lake data — see annotation"
            fi
          done
          if [ "$fail_count" -gt 0 ]; then
            echo "$fail_count brief(s) failed fact-check. Reconcile before publishing."
            exit 1
          fi
      - name: Render every brief to HTML
        run: python tools/render_brief.py
      - name: Commit dist/ briefings (race-safe)
        run: |
          git config user.name "worldscope-bot"
          git config user.email "noreply@github.com"
          # Stage rendered HTML, tolerating either folder being absent.
          [ -d dist/briefings ] && git add -f dist/briefings || true
          [ -d dist/weekly_briefings ] && git add -f dist/weekly_briefings || true
          # If nothing changed, exit cleanly.
          if git diff --staged --quiet; then
            echo "No rendered-HTML changes to commit"
            exit 0
          fi
          git commit -m "rendered briefs ($(date -u +%Y-%m-%d))"
          # Retry-with-rebase loop. Concurrent commits from the pushover
          # workflow or the routine itself otherwise reject our push and
          # leave the HTML undeployed -> 404 on the link Pushover sends.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              break
            fi
            echo "Push rejected on attempt $attempt; rebasing on origin/main"
            git pull --rebase --autostash origin main
          done
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
