name: Pushover brief delivery

# Triggered AFTER "Render brief markdown to HTML" completes, so the URL
# embedded in the Pushover message is guaranteed to be a live page rather
# than a 404. (Before this change the two workflows ran in parallel on
# the same push event; whichever finished first won the race and the
# loser's commit was rejected, producing dead links in notifications.)
#
# Idempotency: each notification commits a marker into .pushover-sent.json
# so the same brief is never notified twice even if the workflow re-runs.

on:
  workflow_run:
    workflows: ["Render brief markdown to HTML"]
    types: [completed]
    branches: [main]
  schedule:
    # Fallback if workflow_run misses (e.g. render failed on first attempt
    # and was manually re-run). Fires hourly 11:30-13:30 UTC for the daily
    # routine and Friday 20:40 UTC for the weekly routine.
    - cron: "30 11-13 * * *"
    - cron: "40 20 * * 5"
  workflow_dispatch:
    inputs:
      brief:
        description: 'Specific brief filename to notify on (e.g. briefings/2026-05-26.md). Leave blank to use the newest.'
        required: false

permissions:
  contents: write

concurrency:
  group: pushover-brief
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    # When fired by workflow_run, only proceed if the upstream Render
    # workflow actually succeeded. Otherwise we'd send a notification
    # pointing at HTML that never deployed. Schedule + workflow_dispatch
    # don't carry a workflow_run context so they always proceed.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - id: pick
        name: Pick the newest brief that hasn't been notified yet
        run: |
          set -e
          MANUAL="${{ github.event.inputs.brief }}"
          SENT_FILE=".pushover-sent.json"
          mkdir -p $(dirname "$SENT_FILE")
          [ -f "$SENT_FILE" ] || echo "[]" > "$SENT_FILE"

          if [ -n "$MANUAL" ] && [ -f "$MANUAL" ]; then
            CHANGED="$MANUAL"
          else
            # Find the newest .md across briefings/ and weekly_briefings/.
            CHANGED=$(ls -t briefings/*.md weekly_briefings/*.md 2>/dev/null | head -1)
          fi
          if [ -z "$CHANGED" ] || [ ! -f "$CHANGED" ]; then
            echo "no brief file found"
            echo "file=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Idempotency: skip if already notified
          if python3 -c "import json,sys; sent=json.load(open('$SENT_FILE')); sys.exit(0 if '$CHANGED' in sent else 1)"; then
            echo "already notified for $CHANGED, skipping"
            echo "file=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "file=$CHANGED" >> $GITHUB_OUTPUT
          if [[ "$CHANGED" == briefings/* ]]; then
            echo "kind=Daily" >> $GITHUB_OUTPUT
            STEM=$(basename "$CHANGED" .md)
            echo "url_path=briefings/${STEM}.html" >> $GITHUB_OUTPUT
          else
            echo "kind=Weekly" >> $GITHUB_OUTPUT
            STEM=$(basename "$CHANGED" .md)
            echo "url_path=weekly_briefings/${STEM}.html" >> $GITHUB_OUTPUT
          fi
          HEADLINE=$(head -1 "$CHANGED" | sed 's/^# *//')
          echo "headline=$HEADLINE" >> $GITHUB_OUTPUT
          # Body: skip H1, strip markdown noise, truncate
          tail -n +2 "$CHANGED" | sed -E 's/\[([^]]+)\]\([^)]+\)/\1/g; s/[*_`#>]+//g' | head -c 900 > /tmp/body.txt

      - name: Send Pushover
        if: steps.pick.outputs.file != ''
        env:
          USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
          APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
        run: |
          if [ -z "$USER_KEY" ] || [ -z "$APP_TOKEN" ]; then
            echo "Pushover credentials missing; set PUSHOVER_USER_KEY and PUSHOVER_APP_TOKEN as repo secrets"
            exit 0
          fi
          BRIEF_URL="https://ihelfrich.github.io/worldscope/${{ steps.pick.outputs.url_path }}"
          # curl -F "message=</tmp/body.txt" reads the file as the field value.
          curl -fsS \
            -F "token=$APP_TOKEN" \
            -F "user=$USER_KEY" \
            -F "title=${{ steps.pick.outputs.kind }} brief: ${{ steps.pick.outputs.headline }}" \
            -F "message=</tmp/body.txt" \
            -F "url=$BRIEF_URL" \
            -F "url_title=Full brief" \
            -F "priority=0" \
            https://api.pushover.net/1/messages.json

      - name: Mark notified
        if: steps.pick.outputs.file != ''
        run: |
          python3 -c "
          import json
          sent = json.load(open('.pushover-sent.json'))
          if '${{ steps.pick.outputs.file }}' not in sent:
              sent.append('${{ steps.pick.outputs.file }}')
          json.dump(sent, open('.pushover-sent.json', 'w'), indent=2)
          "
          git config user.name "worldscope-bot"
          git config user.email "noreply@github.com"
          git add .pushover-sent.json
          git diff --staged --quiet || git commit -m "pushover: notified ${{ steps.pick.outputs.file }}"
          git push
