name: Pushover brief delivery

# Triggered by the routines' pushes to briefings/ or weekly_briefings/.
# Reads the newly-committed brief, builds a Pushover notification with the
# headline as title + first ~900 chars as body + a link to the deployed HTML.

on:
  push:
    branches: [main]
    paths:
      - "briefings/**.md"
      - "weekly_briefings/**.md"

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to diff

      - id: pick
        name: Pick the newest brief file
        run: |
          # Get files added/modified in this push
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- briefings/ weekly_briefings/ | grep -E '\.md$' | tail -1)
          if [ -z "$CHANGED" ]; then
            echo "no brief file in this push"; exit 0
          fi
          echo "file=$CHANGED" >> $GITHUB_OUTPUT
          # Determine kind for the notification title
          if [[ "$CHANGED" == briefings/* ]]; then
            echo "kind=Daily" >> $GITHUB_OUTPUT
            STEM=$(basename "$CHANGED" .md)
            echo "url_path=briefings/${STEM}.html" >> $GITHUB_OUTPUT
          else
            echo "kind=Weekly" >> $GITHUB_OUTPUT
            STEM=$(basename "$CHANGED" .md)
            echo "url_path=weekly_briefings/${STEM}.html" >> $GITHUB_OUTPUT
          fi
          # Extract headline + body
          # First markdown # heading becomes the Pushover title; everything else is the message
          HEADLINE=$(head -1 "$CHANGED" | sed 's/^# *//')
          echo "headline=$HEADLINE" >> $GITHUB_OUTPUT
          # Body is the rest, truncated to Pushover's 1024-char message limit
          BODY=$(tail -n +2 "$CHANGED" | head -c 900)
          # Write to a file (multi-line outputs are awkward via $GITHUB_OUTPUT)
          echo "$BODY" > /tmp/body.txt

      - name: Send Pushover
        if: steps.pick.outputs.file != ''
        env:
          USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
          APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
        run: |
          if [ -z "$USER_KEY" ] || [ -z "$APP_TOKEN" ]; then
            echo "Pushover credentials missing; set PUSHOVER_USER_KEY and PUSHOVER_APP_TOKEN as repo secrets"
            exit 0
          fi
          BRIEF_URL="https://ihelfrich.github.io/worldscope/${{ steps.pick.outputs.url_path }}"
          curl -s \
            -F "token=$APP_TOKEN" \
            -F "user=$USER_KEY" \
            -F "title=${{ steps.pick.outputs.kind }} brief: ${{ steps.pick.outputs.headline }}" \
            -F "message=<$(cat /tmp/body.txt)" \
            -F "url=$BRIEF_URL" \
            -F "url_title=Full brief" \
            -F "priority=0" \
            https://api.pushover.net/1/messages.json
