name: Daily briefing

on:
  push:
    branches: [main]
  schedule:
    # 06:00 America/New_York = 10:00 UTC (EST) / 11:00 UTC (EDT).
    # Running at 10:30 UTC covers both; trim later if you want exact 06:00 local.
    - cron: "30 10 * * *"
  workflow_dispatch:  # so you can fire manually too

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # CI can't see the local 2.6 GB OpenSanctions corpus or the
          # PEP index built from it. Skip those sections so locally-generated
          # content (from Ian's machine, where the data files live) carries
          # forward via the snapshot store rather than being clobbered.
          WORLDSCOPE_SKIP: sanctions,people
          # Use the repo-tracked snapshot store so carry-forward works in CI.
          # Locally-generated sanctions snapshots travel with the repo and
          # CI reads them for the carry-forward render.
          WORLDSCOPE_STORE_PATH: ${{ github.workspace }}/data/store.sqlite
        run: python -m worldscope.brief --out dist
      - name: Commit archive + snapshot store
        run: |
          git config user.name "worldscope-bot"
          git config user.email "noreply@github.com"
          git add -f dist/ data/store.sqlite
          git diff --staged --quiet || git commit -m "briefing $(date -u +%Y-%m-%d)"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
