name: Daily briefing

on:
  push:
    branches: [main]
  schedule:
    # 07:00 UTC = 03:00 ET (EDT) / 02:00 ET (EST). Runs 2 hours before the
    # desk-officer routine (09:00 UTC) and 3 hours before the morning Pushover
    # (10:00 UTC = 06:00 ET). Sequence: data pull (07:00) -> bundle + Pages
    # deploy (~07:30-08:00) -> desk officer reads zip + composes brief (09:00)
    # -> render-briefings.yml renders MD to HTML on commit (~09:30) ->
    # Pushover sends today's freshly-composed brief at 06:00 ET (10:00 UTC).
    - cron: "0 7 * * *"
  workflow_dispatch:  # so you can fire manually too

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # Shared with render-briefings, ukraine-hourly, and pushover-brief.
  # All four push to main with the binary SQLite snapshot store + lake.
  # Git cannot auto-merge those files, so concurrent runs were producing
  # unresolvable rebase conflicts (gemini Pass A finding #2). The shared
  # group serializes them; each workflow waits its turn.
  group: worldscope-state
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
          ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          MEDIACLOUD_API_KEY: ${{ secrets.MEDIACLOUD_API_KEY }}
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
          # CI can't see the local 2.6 GB OpenSanctions corpus or the
          # PEP index built from it. Skip those sections so locally-generated
          # content (from Ian's machine, where the data files live) carries
          # forward via the snapshot store rather than being clobbered.
          WORLDSCOPE_SKIP: sanctions,people
          # Use the repo-tracked snapshot store so carry-forward works in CI.
          # Locally-generated sanctions snapshots travel with the repo and
          # CI reads them for the carry-forward render.
          WORLDSCOPE_STORE_PATH: ${{ github.workspace }}/data/store.sqlite
        run: python -m worldscope.brief --out dist
      - name: Commit archive + snapshot store + lake
        run: |
          git config user.name "worldscope-bot"
          git config user.email "noreply@github.com"
          git add -f dist/ data/store.sqlite lake/ || true
          if git diff --staged --quiet; then
            echo "no changes"; exit 0
          fi
          git commit -m "briefing $(date -u +%Y-%m-%d)"
          # Retry-with-rebase: same race-safety as render-briefings.yml
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"; break
            fi
            echo "Push rejected on attempt $attempt; rebasing"
            git pull --rebase --autostash origin main
          done
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
