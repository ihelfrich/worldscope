# watchareas.yaml — Dr. Helfrich's configured intelligence priorities.
#
# Every item from every section is tagged with the watch areas it matches.
# Tagged items get hoisted into the "Watch areas" section at the top of the
# daily brief. Edit this file at any time — changes take effect on the next
# routine run (no code change needed).
#
# Match logic (OR within a watch area, OR across fields):
#   - source_id must be in `sources` (if specified)
#   - then ANY of: country / actor / theme / entity / bbox / location /
#     keyword / topic matches → item is in the area
#
# Bounding boxes are [west, south, east, north] (decimal degrees, WGS84).
# Themes use GDELT GKG taxonomy: https://blog.gdeltproject.org/gdelt-doc-2-0-api-debuts/

