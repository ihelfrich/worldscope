<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="WORLDSCOPE">
  <title>WORLDSCOPE</title>
  
  <!-- cardinal compass rays -->
  <g stroke="#13294B" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="64" y1="30" x2="64" y2="37"/>
    <line x1="64" y1="91"        x2="64" y2="110"/>
    <line x1="18" y1="64"       x2="37" y2="64"/>
    <line x1="91"  y1="64"       x2="110" y2="64"/>
  </g>
  <!-- diamond outline (heritage ◆ form) -->
  <polygon points="64,42 86,64 64,86 42,64"
           fill="none" stroke="#13294B" stroke-width="3.6"
           stroke-linejoin="round"/>
  <!-- subtle inner facets -->
  <g stroke="#13294B" stroke-width="1.3" stroke-opacity="0.42" fill="none">
    <line x1="42" y1="64" x2="86" y2="64"/>
    <line x1="64"   y1="42" x2="64" y2="86"/>
  </g>
  <!-- gold north-star disc, slightly offset so the ray "carries" it -->
  <circle cx="64" cy="17" r="6" fill="#D4A017"/>
  <circle cx="64" cy="17" r="6" fill="none"
          stroke="#13294B" stroke-width="1.2"/>
</svg>
